#
# - Rules manual:
#   https://yamllint.readthedocs.io/en/stable/rules.html
#
# - Using comments (pragma) to disable some rules:
#   https://yamllint.readthedocs.io/en/stable/disable_with_comments.html
#

extends: default

rules:
  document-start:
    # Having one document per file makes it redundant
    present: false

  line-length:
    max: 100

  quoted-strings:
    quote-type: single
    required: only-when-needed

  truthy:
    # Some files may have boolean-like keys (e.g., GH actions)
    # just let 'em be!
    check-keys: false
