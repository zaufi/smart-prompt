#
# Configuration file for smart-prompt
#
# Most of the settings here are colors. The valid color names are:
#
#  black        dark-grey
#  red          bright-red
#  green        bright-green
#  brown        yellow
#  blue         bright-blue
#  magenta      bright-magenta
#  cyan         bright-cyan
#  gray         white
#
# For 256-color terminals, you can set the value in the following format:
#
#   rgb(R,G,B)
#
# where `R`, `G`, and `B` are numbers less than or equal to `5`; otherwise,
# the color specification will be transformed into an ANSI escape string
# for true-color terminals (16M colors). Another way to specify a color
# for a 16M-color terminal is to use the _hex_ format:
#
#   0xRRGGBB
#   #RRGGBB
#   #RGB
#
# where each component consists of 2 hex digits, except the short CSS form
# `#RGB`, where each digit is doubled.
# There are also some special values for changing style:
#
#  reset
#  bold
#  italic      (this works at least in `konsole`)
#  underscore
#  reverse
#
# Uncomment (and edit) the corresponding line if you would like to change the default value.
#
# To make a theme for a particular terminal, save this file as
# `/etc/smart-prompt.<TERM>.conf` (system-wide) or `~/.smart-promptrc.<TERM>`
# (per-user). Replace the `<TERM>` placeholder with the desired terminal name
# (e.g. result of `echo $TERM`).
#
# ATTENTION The list of color variables below is far from complete.
# If you want to redefine something, take a look at the relevant checker
# file (i.e. to `/usr/libexec/smart-prompt/context-checkers.d/*.sh`)
# for the strings `_get_color_param SP_<SMTH>_COLOR ...`. You
# can override a discovered parameter name in this (or the per-user) file.
#
# ALERT Default config contains Unicode symbols. If your terminal doesn't
# support Unicode properly:
# - use a better terminal program
# - replace the default settings with ASCII alternatives
#

# Symbol to divide segments
#SP_SEGMENT_DELIMITER='〉'

# Symbol to indicate more input needed to complete command (`PS2`)
#SP_CONTINUE_MARKER='…'
#SP_CONTINUE_MARKER_COLOR='red'

# Set color for the segment delimiter
#SP_SEGMENT_COLOR='bright-blue'

# Set the color for the current path
#SP_PWD_COLOR='bright-green'

# Open/close markers around various indicator symbols
#SP_OPEN_MARKS='❲'
#SP_CLOSE_MARKS='❳'
#SP_MARKS_COLOR='bright-green'
# "Map" of the "indicator symbol" to the file name
# Indicators of presence if some file exists in a directory
SP_MARKS_MAP=(
    '🚧: Makefile'
    '🥷: build.ninja'
    '🐳: Dockerfile'
    '🌍: Earthfile'
    '🎁: Vagrantfile'
    '🪝: .pre-commit-config.yaml'
    '📦: debian/rules'
  )
# "Map" of the "indicator symbol" to the `extglob` mask
SP_MARK_PATTERNS_MAP=(
    '🐍: @(Pipfile|setup.py|pyproject.toml)'
    '📦: *.@(nu|)spec'
    '📦: SPECS/*.spec'
    '📃: README@(|.md|.rst)'
  )

# Show the name of the current host
#SP_SHOW_LOCALHOST=true

# Set the regular user color of the `user@host` part of the prompt
#SP_COLOR_USER='bright-green'

# Set the superuser color of the `user@host` part of the prompt
#SP_COLOR_SUSER='bright-red'

# Colors for various severity levels
#SP_COLOR_ALERT='bright-red'
#SP_COLOR_WARN='yellow'
#SP_COLOR_INFO='bright-green'
#SP_COLOR_NOTICE='bright-cyan'
#SP_COLOR_DEBUG='dark-grey'
#SP_COLOR_MISC='white'

# Bash trace parts
# The trace mark is the first (and very special) symbol printed when
# Bash trace is turned on (e.g., `set -x`). It may be repeated for
# commands running in subshells; Bash takes only the very first symbol and
# replicates it. This means it cannot be an escape sequence or a Unicode
# character.
#SP_TRACE_MARK='+ '
#SP_TRACE_FILE_COLOR='dark-grey'
#SP_TRACE_LINENO_COLOR='dark-grey'
#SP_TRACE_CODE_COLOR='reset'

# Date-time format to use
#SP_TIME_FMT='%Y-%m-%d %H:%M:%S'

# Empty directory text/mark (default no mark)
#SP_EMPTY_DIR_MARK=' ∅ '

# Indicate VCS repository type
#SP_INDICATE_REPO_TYPE=false
# It can be a Bash array with, or just a space-separated string of,
# repository types that require a type mark. For example:
#SP_INDICATE_REPO_TYPE=(git svn)
# Git repository marker
#SP_REPO_GIT_MARK=''

#SP_VCS_BRANCH_SYMBOL=':'
# Working tree symbol
#SP_VCS_WT_SYMBOL=''

#SP_GIT_GREEN_COLOR='bright-green'
#SP_GIT_DIRTY_COLOR='yellow'

# Python virtualenv marker
#SP_VIRTUALENV_MARK='🐍:'

# Indicate that we are inside a Docker container
#SP_DOCKER_MARK='🐳:'

# Display the status of only these network interfaces
# (e.g. when navigating to `/etc/NetworkManager` and related directories)
#SP_NET_IFACE_DISPLAY=( eth0 wlan0 )

# Font directory mark
#SP_FONT_DIR_MARK=''
#SP_FONTS_COUNT_COLOR='white'

